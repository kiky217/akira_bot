services:
  akira_bot:
    image: python:3.12-slim
    container_name: akira_bot
    working_dir: /app
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./app:/app
      - ./logs:/app/logs

    command: >
      sh -c "
      pip install --no-cache-dir -r requirements.txt &&
      python main.py
      "

    networks:
      - akira_net

networks:
  akira_net:
    driver: bridge
